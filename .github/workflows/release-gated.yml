name: Release (Gated)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "staging"

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Gate note
        run: echo "Manual approval required by GitHub Environment protection rules."
      - name: Runner preflight (safe)
        run: |
          whoami
          hostname
          test -d "${{ secrets.DEPLOY_PATH }}" || mkdir -p "${{ secrets.DEPLOY_PATH }}"
          echo "Runner local preflight complete."
      - name: Deploy release (idempotent)
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          chmod +x scripts/deploy_staging.sh
          scripts/deploy_staging.sh "${{ inputs.target }}"
