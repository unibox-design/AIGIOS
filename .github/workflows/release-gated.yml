name: Release (Gated)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "staging"

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Gate note
        run: echo "Manual approval required by GitHub Environment protection rules."
      - name: Runner preflight (safe)
        run: |
          whoami
          hostname
          test -d "${{ secrets.DEPLOY_PATH }}" || mkdir -p "${{ secrets.DEPLOY_PATH }}"
          echo "Runner local preflight complete."
      - name: Deploy placeholder
        run: echo "Self-hosted runner ready. Wire staged deploy commands next."
