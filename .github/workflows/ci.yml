name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell lint (basic)
        run: |
          if ls scripts/*.sh >/dev/null 2>&1; then
            bash -n scripts/*.sh
          fi
      - name: Docs policy check
        run: |
          test -f docs/governance/policy.md
          test -f docs/agents/roles-and-contracts.md
