name: Agent Chain (Dry Run)

on:
  workflow_dispatch:
    inputs:
      objective:
        description: "Goal to pass into planner"
        required: false
        default: "Create a concise implementation plan for AIGIOS Agent Factory autonomous PR-only delivery with gated release, rollback, and backups."
      timeout_seconds:
        description: "Per-agent timeout seconds"
        required: false
        default: "120"
      thinking:
        description: "Thinking level"
        required: false
        default: "low"
      fail_on_nogo:
        description: "Fail workflow when governor returns NO-GO (true/false)"
        required: false
        default: "false"

jobs:
  dry_run:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        run: |
          set -euo pipefail
          export PATH="$HOME/.npm-global/bin:$PATH"
          if ! command -v openclaw >/dev/null 2>&1; then
            if [ -x "$HOME/.npm-global/lib/node_modules/openclaw/openclaw.mjs" ]; then
              ln -sf "$HOME/.npm-global/lib/node_modules/openclaw/openclaw.mjs" "$HOME/.npm-global/bin/openclaw"
            fi
          fi
          command -v openclaw
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          command -v jq
      - name: Run agent chain
        id: chain
        continue-on-error: true
        env:
          AGENT_CHAIN_TIMEOUT: ${{ inputs.timeout_seconds }}
          AGENT_CHAIN_THINKING: ${{ inputs.thinking }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.npm-global/bin:$PATH"
          scripts/run_agent_chain.sh "${{ inputs.objective }}"
      - name: Publish decision summary
        if: always()
        run: |
          set -euo pipefail
          OUT_DIR="${{ steps.chain.outputs.out_dir }}"
          DECISION="${{ steps.chain.outputs.decision }}"
          if [ -z "$DECISION" ]; then
            DECISION="UNKNOWN"
          fi
          {
            echo "## Agent Chain Result"
            echo
            echo "- Decision: **${DECISION}**"
            echo "- Objective: `${{ inputs.objective }}`"
            echo "- Output dir: `${OUT_DIR}`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$OUT_DIR" ] && [ -f "${OUT_DIR}/summary.md" ]; then
            cat "${OUT_DIR}/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Enforce NO-GO policy
        if: always()
        run: |
          set -euo pipefail
          DECISION="${{ steps.chain.outputs.decision }}"
          FAIL_ON_NOGO="${{ inputs.fail_on_nogo }}"
          if [ "$DECISION" = "NO-GO" ] && [ "$FAIL_ON_NOGO" = "true" ]; then
            echo "Governor decision is NO-GO and fail_on_nogo=true."
            exit 2
          fi
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-chain-dryrun-${{ github.run_id }}
          path: .artifacts/agent-chain
          if-no-files-found: warn
