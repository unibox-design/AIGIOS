name: Agent Chain (Dry Run)

on:
  workflow_dispatch:
    inputs:
      objective:
        description: "Goal to pass into planner"
        required: false
        default: "Create a concise implementation plan for AIGIOS Agent Factory autonomous PR-only delivery with gated release, rollback, and backups."
      timeout_seconds:
        description: "Per-agent timeout seconds"
        required: false
        default: "120"
      thinking:
        description: "Thinking level"
        required: false
        default: "low"
      fail_on_nogo:
        description: "Fail workflow when governor returns NO-GO (true/false)"
        required: false
        default: "false"
      create_pr_on_go:
        description: "Create draft PR with proposal when decision is allowed (true/false)"
        required: false
        default: "false"
      allow_conditional_go:
        description: "Treat CONDITIONAL-GO as allowed for PR creation (true/false)"
        required: false
        default: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  dry_run:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Preflight
        run: |
          set -euo pipefail
          export PATH="$HOME/.npm-global/bin:$PATH"
          if ! command -v openclaw >/dev/null 2>&1; then
            if [ -x "$HOME/.npm-global/lib/node_modules/openclaw/openclaw.mjs" ]; then
              ln -sf "$HOME/.npm-global/lib/node_modules/openclaw/openclaw.mjs" "$HOME/.npm-global/bin/openclaw"
            fi
          fi
          command -v openclaw
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          command -v jq
      - name: Run agent chain
        id: chain
        continue-on-error: true
        env:
          AGENT_CHAIN_TIMEOUT: ${{ inputs.timeout_seconds }}
          AGENT_CHAIN_THINKING: ${{ inputs.thinking }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.npm-global/bin:$PATH"
          scripts/run_agent_chain.sh "${{ inputs.objective }}"
      - name: Publish decision summary
        if: always()
        run: |
          set -euo pipefail
          OUT_DIR="${{ steps.chain.outputs.out_dir }}"
          DECISION="${{ steps.chain.outputs.decision }}"
          if [ -z "$DECISION" ]; then
            DECISION="UNKNOWN"
          fi
          {
            echo "## Agent Chain Result"
            echo
            echo "- Decision: **${DECISION}**"
            echo "- Objective: `${{ inputs.objective }}`"
            echo "- Output dir: `${OUT_DIR}`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$OUT_DIR" ] && [ -f "${OUT_DIR}/summary.md" ]; then
            cat "${OUT_DIR}/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Enforce NO-GO policy
        if: always()
        run: |
          set -euo pipefail
          DECISION="${{ steps.chain.outputs.decision }}"
          FAIL_ON_NOGO="${{ inputs.fail_on_nogo }}"
          if [ "$DECISION" = "NO-GO" ] && [ "$FAIL_ON_NOGO" = "true" ]; then
            echo "Governor decision is NO-GO and fail_on_nogo=true."
            exit 2
          fi
      - name: Evaluate PR creation gate
        id: prgate
        if: always()
        run: |
          set -euo pipefail
          DECISION="${{ steps.chain.outputs.decision }}"
          CREATE_PR_ON_GO="${{ inputs.create_pr_on_go }}"
          ALLOW_CONDITIONAL_GO="${{ inputs.allow_conditional_go }}"
          SHOULD_CREATE_PR="false"
          if [ "$CREATE_PR_ON_GO" = "true" ]; then
            if [ "$DECISION" = "GO" ]; then
              SHOULD_CREATE_PR="true"
            elif [ "$DECISION" = "CONDITIONAL-GO" ] && [ "$ALLOW_CONDITIONAL_GO" = "true" ]; then
              SHOULD_CREATE_PR="true"
            fi
          fi
          echo "should_create_pr=$SHOULD_CREATE_PR" >> "$GITHUB_OUTPUT"
      - name: Prepare proposal file for PR
        if: always() && steps.prgate.outputs.should_create_pr == 'true'
        run: |
          set -euo pipefail
          DECISION="${{ steps.chain.outputs.decision }}"
          OUT_DIR="${{ steps.chain.outputs.out_dir }}"
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          mkdir -p proposals/agent-chain
          FILE="proposals/agent-chain/${TS}-run-${{ github.run_id }}.md"
          {
            echo "# Agent Chain Proposal"
            echo
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Decision: ${DECISION}"
            echo "- Objective: ${{ inputs.objective }}"
            echo "- Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "## Summary"
            echo
            if [ -n "$OUT_DIR" ] && [ -f "${OUT_DIR}/summary.md" ]; then
              cat "${OUT_DIR}/summary.md"
            else
              echo "_No summary artifact found in workspace._"
            fi
          } > "$FILE"
          echo "proposal_file=$FILE" >> "$GITHUB_ENV"
      - name: Create draft PR from proposal
        if: always() && steps.prgate.outputs.should_create_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(agent-chain): add proposal from run ${{ github.run_id }}"
          branch: codex/agent-chain-proposal-${{ github.run_id }}
          title: "docs(agent-chain): proposal from run ${{ github.run_id }} [${{ steps.chain.outputs.decision }}]"
          body: |
            Automated proposal generated by `Agent Chain (Dry Run)`.

            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Decision: `${{ steps.chain.outputs.decision }}`
            - Objective: `${{ inputs.objective }}`
            - Proposal file: `${{ env.proposal_file }}`

            Review required before any implementation PRs.
          labels: |
            automation
            proposal
          draft: true
          add-paths: |
            proposals/agent-chain/*.md
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-chain-dryrun-${{ github.run_id }}
          path: .artifacts/agent-chain
          if-no-files-found: warn
